# CI/CD 流水线 — GitHub Actions
# 触发：push main / PR
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # 手动触发

jobs:
  # ---------- 前端：类型检查 + 单测 + 构建 ----------
  frontend-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Vitest 单元测试
        run: npm test
      - name: Next.js 构建（含 TypeScript 检查）
        run: npm run build

  # ---------- 后端：导入检查 ----------
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -c "from app.main import app; print('FastAPI import OK')"

  # ---------- Docker 构建 ----------
  docker:
    runs-on: ubuntu-latest
    needs: [frontend-typecheck, backend-tests]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
