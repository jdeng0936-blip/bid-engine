# ═══════════════════════════════════════════════════════
# 投标文件生成核心 Prompt 注册表 — 鲜标智投
# 支持多版本迭代 / A/B 测试
# ═══════════════════════════════════════════════════════

prompts:

  # ===== 投标章节生成 =====
  bid_generation:
    v1_standard:
      version: "1.0"
      description: "标准投标章节生成 — 基于招标要求+企业信息+RAG知识库"
      template: |
        请编写生鲜食材配送投标文件的【{chapter_no} {title}】章节完整正文。

        == 招标项目信息 ==
        采购方：{buyer_name}（{customer_type}）
        项目名称：{project_name}
        预算金额：{budget}元
        配送范围：{delivery_scope}

        == 投标企业信息 ==
        {enterprise_info}

        == 本章节对应评分标准（必须逐条覆盖）==
        {scoring_criteria}

        == 章节大纲框架（必须全部保留并充分展开）==
        {outline}

        == 知识库参考（食品安全法规/冷链标准/行业模板）==
        {rag_context}

        == 历史中标方案参考 ==
        {similar_cases}

        要求：
        1. 语言专业正式，符合政府采购投标文件规范
        2. 每项技术指标必须有具体数值（禁止写"按规定""视情况""根据实际"）
        3. 食品安全措施必须覆盖：留样制度(≥72h)/全程追溯/农残检测/健康证管理
        4. 冷链参数必须符合 GB/T 22918 标准（冷藏0-4℃/冷冻≤-18℃）
        5. 配送承诺必须量化：准时率/破损率/满意率/响应时间
        6. 体现投标企业独特优势和差异化竞争力
        7. 引用法规条款时标注来源（如《食品安全法》第XX条）

        直接输出排版优美的投标文件正文段落，不输出任何自我介绍或致谢。

    v2_with_images:
      version: "2.0"
      description: "V2增强版 — 支持图片引用标记和表格生成"
      template: |
        请编写生鲜食材配送投标文件的【{chapter_no} {title}】章节完整正文。

        == 招标项目信息 ==
        {project_info}

        == 投标企业信息 ==
        {enterprise_info}

        == 评分标准 ==
        {scoring_criteria}

        == 章节大纲 ==
        {outline}

        == 知识库参考 ==
        {rag_context}

        == 可用图片资源（在正文适当位置插入引用标记）==
        {available_images}

        要求：
        1. 所有技术规范同V1要求
        2. 在需要插入图片的位置使用标记格式：[[IMG:图片ID:图片说明文字]]
        3. 在需要表格的位置使用标记格式：[[TABLE:表格标题]]后跟Markdown表格
        4. 插图建议位置：冷链车辆、仓库温区、检测设备、配送流程图、组织架构图

        直接输出投标文件正文。

  # ===== 招标文件解析 =====
  tender_parse:
    v1_structured:
      version: "1.0"
      description: "招标文件结构化解析 — 提取资格要求/评分标准/废标项"
      template: |
        你是专业的招标文件分析师，请仔细阅读以下招标文件内容，
        提取并结构化输出关键信息。

        == 招标文件原文 ==
        {tender_content}

        请严格按照以下 JSON 格式输出：
        {{
          "project_name": "项目名称",
          "buyer_name": "采购方名称",
          "customer_type": "school/hospital/government/enterprise",
          "budget_amount": 数字（元）,
          "deadline": "YYYY-MM-DD HH:MM",
          "tender_type": "open/invite/negotiate",
          "delivery_scope": "配送范围描述",

          "disqualification_items": [
            {{"content": "废标条件1", "severity": "fatal"}},
            ...
          ],

          "qualification_requirements": [
            {{"content": "资格要求1", "is_mandatory": true}},
            ...
          ],

          "technical_requirements": [
            {{"content": "技术要求1", "category": "cold_chain/food_safety/delivery/quality"}},
            ...
          ],

          "scoring_criteria": [
            {{"item": "评分项名称", "max_score": 分数, "weight": 百分比, "description": "评分说明"}},
            ...
          ],

          "commercial_requirements": [
            {{"content": "商务要求1"}},
            ...
          ],

          "quotation_format": {{
            "discount_rate_required": true/false,
            "categories": ["蔬菜", "肉类", ...],
            "pricing_method": "固定单价/下浮率/综合评标价"
          }}
        }}

        注意：
        1. 废标项是最关键的信息，必须逐条提取，不能遗漏任何一条
        2. 如果招标文件中未明确某项，值填写 null
        3. severity 只有 "fatal"（废标）和 "warning"（扣分）两种

  # ===== 合规性审查 =====
  compliance_review:
    v1_five_dimension:
      version: "1.0"
      description: "5维合规审查 — 废标/资格/评分覆盖/报价/食安"
      template: |
        你是食材配送投标领域的合规审查专家。请严格审核以下投标文件内容，
        逐条检查以下 5 个维度的合规性：

        == 招标方资格要求 ==
        {qualification_requirements}

        == 废标条件 ==
        {disqualification_items}

        == 评分标准 ==
        {scoring_criteria}

        == 投标文件技术方案内容 ==
        {bid_content}

        == 企业已有资质清单 ==
        {credentials_list}

        == 报价信息 ==
        {quotation_summary}

        请按以下5个维度逐一审查：

        1.【🔴 废标项扫描】逐条对照废标条件，检查是否全部满足
        2.【🔴 资格证件完整性】比对必需证照 vs 企业已有证照，列出缺口
        3.【🟡 评分覆盖率】每个评分项在技术方案中是否有对应内容
        4.【🟡 报价格式合规】报价格式/小数位/货币/汇总是否符合要求
        5.【🟠 食品安全要素】留样/追溯/农残/健康证/HACCP 是否覆盖

        == 输出格式 ==
        COMPLIANCE_SCORE: X/100
        FATAL_ISSUES: N（致命问题数，任一存在即判定不合格）
        WARNING_ISSUES: N（警告问题数）
        
        DIMENSION_1_DISQUALIFICATION:
        - [条目]: 状态(✅通过/❌不满足) → 修正建议
        
        DIMENSION_2_CREDENTIALS:
        - [证照名称]: ✅已有(有效期至YYYY-MM-DD) / ❌缺失 → 办理建议
        
        DIMENSION_3_SCORING:
        - [评分项](XX分): 覆盖率XX% → 补充建议
        
        DIMENSION_4_QUOTATION:
        - [检查项]: ✅合规 / ❌不合规 → 修正建议
        
        DIMENSION_5_FOOD_SAFETY:
        - [安全要素]: ✅已覆盖 / ❌缺失 → 必须补充内容

  # ===== 报价策略分析 =====
  pricing_strategy:
    v1_analysis:
      version: "1.0"
      description: "报价策略分析 — 基于客户类型和预算给出下浮率建议"
      template: |
        请基于以下信息，给出食材配送投标的报价策略建议：

        采购方类型：{customer_type}
        项目预算：{budget}元
        配送品类：{categories}
        竞争态势：{competition_info}
        历史中标下浮率参考：
        {historical_discount_rates}

        请输出：
        1. 建议下浮率区间及理由
        2. 各品类定价注意事项
        3. 报价风险提示（低于成本/超预算）
        4. 差异化报价策略建议
